<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPIS – визуальная галерея</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0a1128;
            color: #eee;
            padding: 2rem;
        }
        h1 {
            text-align: center;
            margin-bottom: 2rem;
            color: #ffd966;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: #1a1a2e;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s ease;
            border: 1px solid #2a3a5a;
        }
        .card:hover {
            transform: scale(1.02);
            border-color: #ffd966;
        }
        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }
        .card p {
            padding: 0.8rem;
            text-align: center;
            font-size: 0.9rem;
            color: #bbccff;
        }
        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .modal img {
            max-width: 90%;
            max-height: 80%;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        .close {
            position: absolute;
            top: 20px;
            right: 40px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .close:hover { color: #ffd966; }
        .caption {
            margin-top: 1rem;
            color: #ccc;
            font-size: 1rem;
            text-align: center;
        }
        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #888;
        }
        a { color: #bbffaa; }
    </style>
</head>
<body>
    <h1>🖼️ IPIS в реальной среде</h1>
    <div class="gallery" id="gallery"></div>
    <div id="modal" class="modal">
        <span class="close">&times;</span>
        <img id="modal-img" src="">
        <div id="modal-caption" class="caption"></div>
    </div>
    <footer>
        <p>← <a href="../README.md">Назад к README</a> | <a href="https://github.com/snowdimon/IPIS">GitHub</a></p>
    </footer>

    <script>
        const images = [
            { src: "images/man_on_mars.png", caption: "Человек на Марсе – шеврон 03, стек: 01 02’ E" },
            { src: "images/spaceship_close.png", caption: "Пилотируемый корабль – крупный план с нитью 01—03" },
            { src: "images/drone-satelite_close.png", caption: "Дрон-спутник – шестиугольник 02’ на орбите Луны" },
            { src: "images/mission_control.png", caption: "Центр управления – экран с полем IPIS_CODE" },
            { src: "images/spaceship_full.png", caption: "Корабль целиком – нить на корпусе видна издалека" },
            { src: "images/drone-satelite_full.png", caption: "Беспилотник в глубоком космосе – код 00" },
            { src: "images/spacecraft_hull.png", caption: "Фрагмент обшивки с прямой нитью между 01 и 03" },
            { src: "images/uniform_patches.png", caption: "Повседневная форма с шевронами и стеками экипажа" }
        ];

        const galleryDiv = document.getElementById('gallery');
        const modal = document.getElementById('modal');
        const modalImg = document.getElementById('modal-img');
        const modalCaption = document.getElementById('modal-caption');
        const closeBtn = document.getElementsByClassName('close')[0];

        images.forEach(img => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<img src="${img.src}" alt="${img.caption}"><p>${img.caption}</p>`;
            card.onclick = () => {
                modal.style.display = 'flex';
                modalImg.src = img.src;
                modalCaption.innerText = img.caption;
            };
            galleryDiv.appendChild(card);
        });

        closeBtn.onclick = () => modal.style.display = 'none';
        window.onclick = (e) => { if (e.target == modal) modal.style.display = 'none'; };
    </script>
</body>
</html>
