<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <style>
      .bg { fill: #1a1a2e; }
      .layer-outer { fill: #0a1128; stroke: #ffffff; stroke-width: 2; }
      .layer-inner { fill: #333333; stroke: #cccccc; stroke-width: 1; }
      .text-outer { fill: #ffffff; font-family: 'Arial', sans-serif; font-weight: bold; font-size: 18px; text-anchor: middle; dominant-baseline: central; }
      .text-inner { fill: #ffffff; font-family: 'Arial', sans-serif; font-weight: bold; font-size: 12px; text-anchor: middle; dominant-baseline: central; }
      .label { fill: #aaaaaa; font-family: 'Arial', sans-serif; font-size: 12px; text-anchor: middle; }
      .arrow { stroke: #ffaa00; stroke-width: 2; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffaa00" />
    </marker>
  </defs>
  
  <rect class="bg" x="0" y="0" width="400" height="200" rx="10" ry="10" />
  
  <!-- Двухслойный шеврон: внешний круглый слой и внутренний маленький кружок -->
  <circle class="layer-outer" cx="130" cy="90" r="50" />
  <text class="text-outer" x="130" y="90">01</text>
  
  <!-- Внутренний кружок (скрыт под внешним слоем) -->
  <circle class="layer-inner" cx="130" cy="120" r="20" />
  <text class="text-inner" x="130" y="120">01</text>
  
  <!-- Стрелка отлепления -->
  <line class="arrow" x1="190" y1="90" x2="240" y2="90" />
  <text class="label" x="215" y="80" fill="#ffaa00">peel off</text>
  
  <!-- Результат: внутренний кружок добавляется в стек -->
  <circle class="layer-inner" cx="290" cy="70" r="20" />
  <text class="text-inner" x="290" y="70">01</text>
  <text class="label" x="290" y="110">added to stack</text>
</svg>
