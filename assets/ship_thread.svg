<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 150" width="300" height="150">
  <defs>
    <style>
      .bg { fill: #0a1128; }
      .circle-node { fill: none; stroke: #ffffff; stroke-width: 3; }
      .node-text { fill: #ffffff; font-family: 'Arial', sans-serif; font-weight: bold; font-size: 24px; text-anchor: middle; dominant-baseline: central; }
      .thread { stroke: #ffffff; stroke-width: 3; }
    </style>
  </defs>
  
  <!-- Фон как у остальных -->
  <rect class="bg" x="0" y="0" width="300" height="150" rx="10" ry="10" />
  
  <!-- Нить от правого края левого круга до левого края правого круга -->
  <line class="thread" x1="76" y1="75" x2="224" y2="75" />
  
  <!-- Левый круг (01) -->
  <circle class="circle-node" cx="60" cy="75" r="16" />
  <text class="node-text" x="60" y="75">01</text>
  
  <!-- Правый круг (03) -->
  <circle class="circle-node" cx="240" cy="75" r="16" />
  <text class="node-text" x="240" y="75">03</text>
</svg>
